<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <meta name="description" content="MariOT - Maritime Testbed of Shipboard Operational Technology">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="MariOT">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>MariOT - Maritime Testbed of Shipboard Operational Technology</title>
  <link rel="manifest" href="manifest.json">
  
  <style>
    /* Enable text selection across all elements */
    *, *::before, *::after {
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
      user-select: text !important;
      -webkit-touch-callout: default !important;
    }
    
    /* Specifically target Flutter canvas elements */
    flt-glass-pane, flt-glass-pane * {
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
      user-select: text !important;
    }
    
    body, html {
      -webkit-user-select: text !important;
      -moz-user-select: text !important;
      -ms-user-select: text !important;
      user-select: text !important;
    }
  </style>
</head>
<body>
  <script>
    // Force HTML renderer for text selection support - MUST be set before Flutter loads
    window.flutterWebRenderer = "html";
  </script>
  <script>
    // Keep mobile viewport zoom enabled even if runtime scripts update it.
    (function () {
      const viewportContent = "width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes";

      function enforceViewport() {
        let viewport = document.querySelector('meta[name="viewport"]');
        if (!viewport) {
          viewport = document.createElement('meta');
          viewport.setAttribute('name', 'viewport');
          document.head.appendChild(viewport);
        }
        if (viewport.getAttribute('content') !== viewportContent) {
          viewport.setAttribute('content', viewportContent);
        }
      }

      enforceViewport();
      document.addEventListener('DOMContentLoaded', enforceViewport);
      window.addEventListener('load', enforceViewport);

      const observer = new MutationObserver(enforceViewport);
      observer.observe(document.head, { childList: true, subtree: true, attributes: true, attributeFilter: ['content'] });
    })();
  </script>
  <script>
    // Enable text selection on Flutter web
    window.addEventListener('load', function() {
      // Allow text selection on all elements
      document.addEventListener('selectstart', function(e) {
        return true;
      }, false);
      
      // Enable copy functionality
      document.addEventListener('copy', function(e) {
        return true;
      }, false);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
